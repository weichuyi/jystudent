{% extends "base.html" %}
{% block title %}代学生选课{% endblock %}
{% block page_title %}代学生选课{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">代学生选课</h1>
    <p class="page-subtitle">管理员可直接为学生补选课程</p>
  </div>
  <a href="{{ url_for('list_enrollments') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回选课记录</a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <form method="post" class="card">
      <div class="card-body">
        <div style="margin-bottom:1rem">
          <label class="form-label">学生 <span style="color:#ef4444">*</span></label>
          <select class="form-select" name="student_id" required>
            <option value="">请选择学生</option>
            {% for s in students %}
            <option value="{{ s.id }}" {% if selected_student_id == s.id %}selected{% endif %}>{{ s.student_no }} - {{ s.name }}{% if s.class_obj %} - {{ s.class_obj.class_name }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>

        <div style="margin-bottom:.2rem">
          <label class="form-label">课程 <span style="color:#ef4444">*</span></label>
          <select class="form-select" name="course_id" required>
            <option value="">请选择课程</option>
            {% for c in courses %}
            <option value="{{ c.id }}" {% if selected_course_id == c.id %}selected{% endif %}>{{ c.course_no }} - {{ c.course_name }}{% if c.semester %} - {{ c.semester }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="card-footer d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{{ url_for('list_enrollments') }}">取消</a>
        <button class="btn btn-primary" type="submit"><i class="bi bi-check-circle"></i> 确认选课</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
