{% extends "base.html" %}

{% block title %}{% if action == 'add' %}新增班级{% else %}编辑班级{% endif %}{% endblock %}

{% block content %}
<div class="py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="h2 mb-4">{% if action == 'add' %}新增班级{% else %}编辑班级{% endif %}</h1>

            <form method="post" class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">班级编号 *</label>
                        <input class="form-control" type="text" name="class_no" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">班级名称 *</label>
                        <input class="form-control" type="text" name="class_name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">年级</label>
                        <select class="form-select" name="grade">
                            <option value="">请选择</option>
                            <option value="一年级">一年级</option>
                            <option value="二年级">二年级</option>
                            <option value="三年级">三年级</option>
                            <option value="四年级">四年级</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">班主任</label>
                        <select class="form-select" name="headteacher_id">
                            <option value="">请选择班主任</option>
                            {% for t in teachers %}
                            <option value="{{ t.id }}">{{ t.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="card-footer d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-secondary" href="{{ url_for('list_classes') }}">取消</a>
                    <button class="btn btn-primary" type="submit">
                        {% if action == 'add' %}新增{% else %}保存{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
