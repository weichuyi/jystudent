<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} - 学生信息管理系统</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 m-0">{{ title }}</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('list_students') }}">返回列表</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="mb-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      <form
        method="post"
        action="{% if student_id %}{{ url_for('edit_student', student_id=student_id) }}{% else %}{{ url_for('add_student') }}{% endif %}"
        class="card shadow-sm"
      >
        <div class="card-body row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">学号 *</label>
            <input
              class="form-control"
              name="student_no"
              value="{{ student.student_no or '' }}"
              required
            />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">姓名 *</label>
            <input class="form-control" name="name" value="{{ student.name or '' }}" required />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">性别</label>
            <select class="form-select" name="gender">
              <option value="" {% if not student.gender %}selected{% endif %}>请选择</option>
              <option value="男" {% if student.gender == '男' %}selected{% endif %}>男</option>
              <option value="女" {% if student.gender == '女' %}selected{% endif %}>女</option>
            </select>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">年龄</label>
            <input class="form-control" name="age" type="number" min="1" max="120" value="{{ student.age or '' }}" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">专业</label>
            <input class="form-control" name="major" value="{{ student.major or '' }}" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">电话</label>
            <input class="form-control" name="phone" value="{{ student.phone or '' }}" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">邮箱</label>
            <input class="form-control" name="email" type="email" value="{{ student.email or '' }}" />
          </div>
        </div>
        <div class="card-footer d-flex justify-content-end gap-2">
          <a class="btn btn-outline-secondary" href="{{ url_for('list_students') }}">取消</a>
          <button class="btn btn-primary" type="submit">保存</button>
        </div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
