{% extends "base.html" %}

{% block title %}登录 - 学生管理系统{% endblock %}

{% block content %}
<div class="container-sm py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="h4 fw-bold mb-1">登录</h2>
                        <p class="text-muted">学生信息管理系统</p>
                    </div>

                    <form method="post" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input class="form-control form-control-lg" type="text" name="username" required autofocus>
                            <small class="text-muted d-block mt-1">默认管理员: admin / admin@2024</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input class="form-control form-control-lg" type="password" name="password" required>
                        </div>

                        <button class="btn btn-primary btn-lg w-100" type="submit">登 录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
