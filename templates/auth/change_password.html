{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block page_title %}修改密码{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">修改密码</h1>
    <p class="page-subtitle">请输入原密码和新密码</p>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <form method="post" class="card">
      <div class="card-body auth-card-body">
        <div class="auth-field">
          <label class="form-label">原密码 <span class="required-mark">*</span></label>
          <input class="form-control" type="password" name="old_password" required>
        </div>
        <div class="auth-field">
          <label class="form-label">新密码 <span class="required-mark">*</span></label>
          <input class="form-control" type="password" name="new_password" required>
          <div class="auth-note">至少 6 个字符</div>
        </div>
        <div>
          <label class="form-label">确认新密码 <span class="required-mark">*</span></label>
          <input class="form-control" type="password" name="confirm_password" required>
        </div>
      </div>
      <div class="card-footer d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">取消</a>
        <button class="btn btn-primary" type="submit">
          <i class="bi bi-key"></i> 修改密码
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
