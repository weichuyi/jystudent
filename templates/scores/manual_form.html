{% extends "base.html" %}
{% block title %}手动录入成绩{% endblock %}
{% block page_title %}手动录入成绩{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">手动录入成绩</h1>
    <p class="page-subtitle">可直接为学生课程录入成绩；若无选课记录将自动创建</p>
  </div>
  <a href="{{ url_for('list_scores') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回成绩管理</a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <form method="post" class="card">
      <div class="card-body">
        <div style="margin-bottom:1rem">
          <label class="form-label">学生 <span style="color:#ef4444">*</span></label>
          <select class="form-select" name="student_id" required>
            <option value="">请选择学生</option>
            {% for s in students %}
            <option value="{{ s.id }}" {% if selected_student_id == s.id %}selected{% endif %}>{{ s.student_no }} - {{ s.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div style="margin-bottom:1rem">
          <label class="form-label">课程 <span style="color:#ef4444">*</span></label>
          <select class="form-select" name="course_id" required>
            <option value="">请选择课程</option>
            {% for c in courses %}
            <option value="{{ c.id }}" {% if selected_course_id == c.id %}selected{% endif %}>{{ c.course_no }} - {{ c.course_name }}</option>
            {% endfor %}
          </select>
        </div>

        <div style="margin-bottom:1rem">
          <label class="form-label">成绩 (0-100) <span style="color:#ef4444">*</span></label>
          <input class="form-control" type="number" name="score" min="0" max="100" value="{{ score_value }}" required>
        </div>

        <div style="margin-bottom:.2rem">
          <label class="form-label">等级</label>
          <select class="form-select" name="grade">
            <option value="" {% if not grade %}selected{% endif %}>自动计算</option>
            <option value="A" {% if grade == 'A' %}selected{% endif %}>A</option>
            <option value="B" {% if grade == 'B' %}selected{% endif %}>B</option>
            <option value="C" {% if grade == 'C' %}selected{% endif %}>C</option>
            <option value="D" {% if grade == 'D' %}selected{% endif %}>D</option>
            <option value="F" {% if grade == 'F' %}selected{% endif %}>F</option>
          </select>
        </div>
      </div>

      <div class="card-footer d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{{ url_for('list_scores') }}">取消</a>
        <button class="btn btn-primary" type="submit"><i class="bi bi-check-circle"></i> 提交录入</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
